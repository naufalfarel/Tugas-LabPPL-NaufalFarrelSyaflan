<article class="product-card">
    <div class="product-visual {{ produk.aksen }}">
        <span>{{ produk.kode }}</span>
    </div>
    <div class="product-body">
        <div class="product-topline">
            <span class="badge">{{ produk.kategori }}</span>
            <span class="rating">Rating {{ produk.rating }}</span>
        </div>
        <h3>{{ produk.nama }}</h3>
        <p>{{ produk.deskripsi_singkat }}</p>
        <div class="product-footer">
            <strong>{{ produk.harga_label }}</strong>
            <a class="mini-button" href="{% url 'produk_detail' produk.id %}">Lihat Detail</a>
        </div>
    </div>
</article>
